
<div class="container mt-2">
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!--- Note that these columns can be defined in any order.
          The actual rendered columns are set as a property on the row definition" -->

    <!-- Position Column -->
    <ng-container matColumnDef="Name">
      <th mat-header-cell *matHeaderCellDef> Name. </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="RentPerDay">
      <th mat-header-cell *matHeaderCellDef> RentPerDay </th>
      <td mat-cell *matCellDef="let element"> {{element.rentPerDay}} </td>
    </ng-container>

    <!-- Weight Column -->
    <ng-container matColumnDef="maximumCapacity">
      <th mat-header-cell *matHeaderCellDef> maximumCapacity </th>
      <td mat-cell *matCellDef="let element"> {{element.maximumCapacity}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>


</div>
